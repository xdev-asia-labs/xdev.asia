<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0c1426"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="docker" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="300" cy="200" rx="280" ry="280" fill="#0ea5e9" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="850" cy="450" rx="250" ry="250" fill="#2563eb" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#0ea5e9" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Harbor / Container Registry panel -->
  <g transform="translate(760, 90)" filter="url(#shadow)">
    <rect width="360" height="440" rx="16" fill="#111827" stroke="#1e3a5f" stroke-width="1.5" opacity="0.9"/>
    <!-- Container boxes -->
    <g transform="translate(40, 40)">
      <rect width="120" height="80" rx="8" fill="#1e3a8a" opacity="0.5" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="60" y="35" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">nginx:latest</text>
      <text x="60" y="55" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">256 MB</text>
    </g>
    <g transform="translate(180, 40)">
      <rect width="120" height="80" rx="8" fill="#1e3a8a" opacity="0.5" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="60" y="35" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">app:v2.1</text>
      <text x="60" y="55" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">512 MB</text>
    </g>
    <g transform="translate(40, 140)">
      <rect width="120" height="80" rx="8" fill="#1e3a8a" opacity="0.5" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="60" y="35" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">postgres:16</text>
      <text x="60" y="55" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">384 MB</text>
    </g>
    <g transform="translate(180, 140)">
      <rect width="120" height="80" rx="8" fill="#1e3a8a" opacity="0.5" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="60" y="35" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">redis:7</text>
      <text x="60" y="55" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">128 MB</text>
    </g>
    <!-- Harbor logo area -->
    <rect x="40" y="250" width="280" height="40" rx="6" fill="#0c4a6e" opacity="0.4"/>
    <text x="180" y="276" font-family="system-ui,sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="600">⚓ Harbor Registry</text>
    <!-- Security scan -->
    <text x="40" y="325" font-family="monospace" font-size="11" fill="#0ea5e9" opacity="0.6">$ docker push harbor.local/app:v2.1</text>
    <text x="40" y="345" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.5">✓ Vulnerability scan: PASSED</text>
    <text x="40" y="365" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.5">✓ HTTPS: Enabled</text>
    <text x="40" y="385" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.5">✓ RBAC: Configured</text>
    <!-- Status bar -->
    <rect x="40" y="405" width="200" height="6" rx="3" fill="#1e293b"/>
    <rect x="40" y="405" width="170" height="6" rx="3" fill="#0ea5e9" opacity="0.7"/>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#0ea5e9" font-weight="600" letter-spacing="3">CONTAINER REGISTRY</text>
  <text x="60" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="48" fill="#f1f5f9" font-weight="700">Cài Đặt Harbor</text>
  <text x="60" y="258" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Ubuntu 24.04</text>

  <!-- Tags -->
  <rect x="60" y="310" width="90" height="28" rx="14" fill="#0c4a6e" opacity="0.6"/>
  <text x="105" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">Docker</text>
  <rect x="160" y="310" width="90" height="28" rx="14" fill="#0c4a6e" opacity="0.6"/>
  <text x="205" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">HTTPS</text>
  <rect x="260" y="310" width="100" height="28" rx="14" fill="#0c4a6e" opacity="0.6"/>
  <text x="310" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle">Security</text>

  <rect x="60" y="380" width="640" height="1" fill="#1e3a5f" opacity="0.5"/>
  <text x="60" y="420" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Private Docker Registry · HTTPS · Backup · Best Practices</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#0c4a6e" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#38bdf8" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>