<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#336791"/>
      <stop offset="100%" style="stop-color:#2a5478"/>
    </linearGradient>
    <linearGradient id="pg-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#336791"/>
      <stop offset="100%" style="stop-color:#264d6e"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="280" ry="280" fill="#336791" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="900" cy="400" rx="250" ry="250" fill="#22c55e" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#336791" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Backup flow diagram -->
  <g transform="translate(720, 80)" filter="url(#shadow)">
    <rect width="400" height="470" rx="16" fill="#111827" stroke="#1e3a5f" stroke-width="1.5" opacity="0.9"/>

    <!-- Database icon -->
    <ellipse cx="100" cy="70" rx="50" ry="18" fill="none" stroke="#336791" stroke-width="2"/>
    <path d="M50,70 L50,110 C50,120 72,128 100,128 C128,128 150,120 150,110 L150,70" fill="none" stroke="#336791" stroke-width="2"/>
    <ellipse cx="100" cy="110" rx="50" ry="18" fill="none" stroke="#336791" stroke-width="2" opacity="0.5"/>
    <text x="100" y="90" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">PostgreSQL</text>

    <!-- Arrows to backup methods -->
    <line x1="150" y1="90" x2="210" y2="60" stroke="#336791" stroke-width="1" opacity="0.5"/>
    <line x1="150" y1="100" x2="210" y2="100" stroke="#336791" stroke-width="1" opacity="0.5"/>
    <line x1="150" y1="110" x2="210" y2="140" stroke="#336791" stroke-width="1" opacity="0.5"/>

    <!-- Backup methods -->
    <rect x="210" y="40" width="150" height="36" rx="6" fill="#1e293b" stroke="#336791" stroke-width="1"/>
    <text x="285" y="63" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">pg_dump</text>
    <rect x="210" y="84" width="150" height="36" rx="6" fill="#1e293b" stroke="#336791" stroke-width="1"/>
    <text x="285" y="107" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">pg_basebackup</text>
    <rect x="210" y="128" width="150" height="36" rx="6" fill="#1e293b" stroke="#336791" stroke-width="1"/>
    <text x="285" y="151" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">WAL Archiving</text>

    <!-- Restore flow -->
    <rect x="30" y="190" width="340" height="2" fill="#1e293b"/>
    <text x="200" y="220" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="500">Restore Pipeline</text>

    <!-- Restore steps -->
    <rect x="30" y="240" width="340" height="36" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="50" y="263" font-family="monospace" font-size="11" fill="#22c55e">1.</text>
    <text x="70" y="263" font-family="monospace" font-size="11" fill="#a1a1aa">pg_restore --verbose -d mydb backup.dump</text>

    <rect x="30" y="286" width="340" height="36" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="50" y="309" font-family="monospace" font-size="11" fill="#22c55e">2.</text>
    <text x="70" y="309" font-family="monospace" font-size="11" fill="#a1a1aa">PITR → recovery_target_time</text>

    <rect x="30" y="332" width="340" height="36" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
    <text x="50" y="355" font-family="monospace" font-size="11" fill="#22c55e">3.</text>
    <text x="70" y="355" font-family="monospace" font-size="11" fill="#a1a1aa">Verify → pg_catalog consistency</text>

    <!-- Schedule -->
    <text x="30" y="405" font-family="monospace" font-size="11" fill="#6b7280">Cron: 0 2 * * * /backup.sh</text>
    <text x="30" y="425" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.7">✓ Last backup: 2h ago · 2.4GB</text>
    <text x="30" y="445" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.7">✓ Retention: 30 days</text>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#60a5fa" font-weight="600" letter-spacing="3">POSTGRESQL</text>
  <text x="60" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="44" fill="#f1f5f9" font-weight="700">Backup &amp; Restore</text>
  <text x="60" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Toàn Diện</text>

  <rect x="60" y="310" width="100" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="110" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">pg_dump</text>
  <rect x="170" y="310" width="130" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="235" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">basebackup</text>
  <rect x="310" y="310" width="70" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="345" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">PITR</text>
  <rect x="390" y="310" width="80" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="430" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">WAL</text>

  <rect x="60" y="380" width="600" height="1" fill="#1e3a5f" opacity="0.5"/>
  <text x="60" y="420" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Logical · Physical · Point-in-Time Recovery · Docker Compose</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#1e3a5f" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>