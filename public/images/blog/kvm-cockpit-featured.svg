<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e95420"/>
      <stop offset="100%" style="stop-color:#c7411a"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="250" cy="200" rx="250" ry="250" fill="#e95420" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="950" cy="350" rx="250" ry="250" fill="#0ea5e9" opacity="0.07" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#e95420" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Cockpit Web UI panel -->
  <g transform="translate(720, 70)" filter="url(#shadow)">
    <rect width="410" height="490" rx="12" fill="#1c2128" stroke="#30363d" stroke-width="1.5"/>
    <!-- Browser tab bar -->
    <rect x="0" y="0" width="410" height="36" rx="12" fill="#21262d"/>
    <circle cx="20" cy="18" r="5" fill="#f85149" opacity="0.8"/>
    <circle cx="38" cy="18" r="5" fill="#d29922" opacity="0.8"/>
    <circle cx="56" cy="18" r="5" fill="#3fb950" opacity="0.8"/>
    <rect x="80" y="8" width="250" height="20" rx="4" fill="#161b22"/>
    <text x="205" y="22" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">https://cockpit.local:9090</text>

    <!-- Sidebar -->
    <rect x="0" y="36" width="100" height="454" fill="#161b22"/>
    <rect x="10" y="50" width="80" height="24" rx="4" fill="#21262d"/>
    <text x="50" y="67" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Overview</text>
    <rect x="10" y="82" width="80" height="24" rx="4" fill="#e95420" opacity="0.3"/>
    <text x="50" y="99" font-family="system-ui,sans-serif" font-size="10" fill="#e95420" text-anchor="middle" font-weight="600">VMs</text>
    <rect x="10" y="114" width="80" height="24" rx="4" fill="#21262d"/>
    <text x="50" y="131" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Network</text>
    <rect x="10" y="146" width="80" height="24" rx="4" fill="#21262d"/>
    <text x="50" y="163" font-family="system-ui,sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Storage</text>

    <!-- Content area - VM list -->
    <text x="120" y="65" font-family="system-ui,sans-serif" font-size="14" fill="#f0f6fc" font-weight="600">Virtual Machines</text>
    <!-- VM row 1 -->
    <rect x="110" y="80" width="285" height="55" rx="6" fill="#21262d"/>
    <circle cx="130" cy="107" r="6" fill="#3fb950"/>
    <text x="145" y="100" font-family="monospace" font-size="11" fill="#f0f6fc">web-server-01</text>
    <text x="145" y="118" font-family="monospace" font-size="10" fill="#8b949e">Running · 4 vCPU · 8GB</text>
    <rect x="340" y="94" width="45" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="362" y="108" font-family="system-ui,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Stop</text>
    <!-- VM row 2 -->
    <rect x="110" y="145" width="285" height="55" rx="6" fill="#21262d"/>
    <circle cx="130" cy="172" r="6" fill="#3fb950"/>
    <text x="145" y="165" font-family="monospace" font-size="11" fill="#f0f6fc">db-primary</text>
    <text x="145" y="183" font-family="monospace" font-size="10" fill="#8b949e">Running · 8 vCPU · 16GB</text>
    <rect x="340" y="159" width="45" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="362" y="173" font-family="system-ui,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Stop</text>
    <!-- VM row 3 -->
    <rect x="110" y="210" width="285" height="55" rx="6" fill="#21262d"/>
    <circle cx="130" cy="237" r="6" fill="#6e7681"/>
    <text x="145" y="230" font-family="monospace" font-size="11" fill="#f0f6fc">dev-sandbox</text>
    <text x="145" y="248" font-family="monospace" font-size="10" fill="#8b949e">Stopped · 2 vCPU · 4GB</text>
    <rect x="340" y="224" width="45" height="20" rx="4" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="362" y="238" font-family="system-ui,sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Start</text>

    <!-- Network section -->
    <text x="120" y="300" font-family="system-ui,sans-serif" font-size="12" fill="#f0f6fc" font-weight="600">Networks</text>
    <rect x="110" y="310" width="285" height="40" rx="6" fill="#21262d"/>
    <text x="125" y="335" font-family="monospace" font-size="11" fill="#0ea5e9">br0 (bridge)</text>
    <text x="310" y="335" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="end">Active</text>

    <rect x="110" y="360" width="285" height="40" rx="6" fill="#21262d"/>
    <text x="125" y="385" font-family="monospace" font-size="11" fill="#0ea5e9">virbr0 (NAT)</text>
    <text x="310" y="385" font-family="monospace" font-size="10" fill="#3fb950" text-anchor="end">Active</text>

    <!-- CPU gauge -->
    <text x="120" y="430" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">CPU Usage</text>
    <rect x="120" y="438" width="265" height="8" rx="4" fill="#21262d"/>
    <rect x="120" y="438" width="150" height="8" rx="4" fill="#e95420" opacity="0.7"/>
    <text x="390" y="447" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="end">57%</text>
    <text x="120" y="472" font-family="system-ui,sans-serif" font-size="11" fill="#8b949e">Memory</text>
    <rect x="120" y="480" width="265" height="8" rx="4" fill="#21262d"/>
    <rect x="120" y="480" width="190" height="8" rx="4" fill="#a855f7" opacity="0.7"/>
    <text x="390" y="489" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="end">72%</text>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#e95420" font-weight="600" letter-spacing="3">KVM + COCKPIT</text>
  <text x="60" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="44" fill="#f1f5f9" font-weight="700">KVM trên Ubuntu</text>
  <text x="60" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="32" fill="#94a3b8" font-weight="400">Cockpit Web UI</text>

  <rect x="60" y="310" width="80" height="28" rx="14" fill="#431407" opacity="0.6"/>
  <text x="100" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">KVM</text>
  <rect x="150" y="310" width="100" height="28" rx="14" fill="#431407" opacity="0.6"/>
  <text x="200" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">Cockpit</text>
  <rect x="260" y="310" width="115" height="28" rx="14" fill="#431407" opacity="0.6"/>
  <text x="317" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">Homelab</text>

  <rect x="60" y="380" width="600" height="1" fill="#2d1a3e" opacity="0.5"/>
  <text x="60" y="420" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Network Bridge · NAT · Storage Pool · 2-Node Homelab</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#431407" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#fb923c" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>