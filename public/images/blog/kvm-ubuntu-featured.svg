<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e95420"/>
      <stop offset="100%" style="stop-color:#c7411a"/>
    </linearGradient>
    <linearGradient id="vm-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="200" cy="180" rx="250" ry="250" fill="#e95420" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="900" cy="400" rx="280" ry="280" fill="#7c3aed" opacity="0.07" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#e95420" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- VM Stack visualization -->
  <g transform="translate(760, 80)" filter="url(#shadow)">
    <rect width="360" height="460" rx="16" fill="#111827" stroke="#2d1a3e" stroke-width="1.5" opacity="0.9"/>
    <!-- Host layer -->
    <rect x="30" y="360" width="300" height="60" rx="8" fill="#1c1c2e" stroke="#e95420" stroke-width="1.5" opacity="0.7"/>
    <text x="180" y="395" font-family="monospace" font-size="13" fill="#e95420" text-anchor="middle" font-weight="600">Ubuntu 24.04 Host</text>
    <!-- KVM layer -->
    <rect x="30" y="280" width="300" height="60" rx="8" fill="#1c1c2e" stroke="#a855f7" stroke-width="1.5" opacity="0.7"/>
    <text x="180" y="315" font-family="monospace" font-size="13" fill="#a855f7" text-anchor="middle" font-weight="600">KVM Hypervisor</text>
    <!-- VM boxes -->
    <rect x="30" y="40" width="135" height="100" rx="8" fill="#1e1e30" stroke="#7c3aed" stroke-width="1"/>
    <text x="97" y="70" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">VM 1</text>
    <rect x="45" y="82" width="105" height="14" rx="3" fill="#1e293b"/>
    <rect x="45" y="82" width="75" height="14" rx="3" fill="#7c3aed" opacity="0.5"/>
    <text x="97" y="118" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">4 vCPU · 8GB</text>

    <rect x="195" y="40" width="135" height="100" rx="8" fill="#1e1e30" stroke="#7c3aed" stroke-width="1"/>
    <text x="262" y="70" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">VM 2</text>
    <rect x="210" y="82" width="105" height="14" rx="3" fill="#1e293b"/>
    <rect x="210" y="82" width="60" height="14" rx="3" fill="#7c3aed" opacity="0.5"/>
    <text x="262" y="118" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">2 vCPU · 4GB</text>

    <rect x="30" y="160" width="135" height="100" rx="8" fill="#1e1e30" stroke="#7c3aed" stroke-width="1"/>
    <text x="97" y="190" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">VM 3</text>
    <rect x="45" y="202" width="105" height="14" rx="3" fill="#1e293b"/>
    <rect x="45" y="202" width="90" height="14" rx="3" fill="#7c3aed" opacity="0.5"/>
    <text x="97" y="238" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">8 vCPU · 16GB</text>

    <rect x="195" y="160" width="135" height="100" rx="8" fill="#1e1e30" stroke="#7c3aed" stroke-width="1"/>
    <text x="262" y="190" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">VM 4</text>
    <rect x="210" y="202" width="105" height="14" rx="3" fill="#1e293b"/>
    <rect x="210" y="202" width="45" height="14" rx="3" fill="#7c3aed" opacity="0.5"/>
    <text x="262" y="238" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">1 vCPU · 2GB</text>

    <!-- Connection lines -->
    <line x1="97" y1="140" x2="97" y2="160" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <line x1="262" y1="140" x2="262" y2="160" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <line x1="97" y1="260" x2="97" y2="280" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <line x1="262" y1="260" x2="262" y2="280" stroke="#a855f7" stroke-width="1" opacity="0.3"/>
    <line x1="180" y1="340" x2="180" y2="360" stroke="#e95420" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#e95420" font-weight="600" letter-spacing="3">VIRTUALIZATION</text>
  <text x="60" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="48" fill="#f1f5f9" font-weight="700">Cài Đặt KVM</text>
  <text x="60" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Ubuntu 24.04</text>

  <rect x="60" y="310" width="90" height="28" rx="14" fill="#431407" opacity="0.6"/>
  <text x="105" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">KVM</text>
  <rect x="160" y="310" width="105" height="28" rx="14" fill="#431407" opacity="0.6"/>
  <text x="212" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">libvirt</text>
  <rect x="275" y="310" width="125" height="28" rx="14" fill="#431407" opacity="0.6"/>
  <text x="337" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#fb923c" text-anchor="middle">Bridge Net</text>

  <rect x="60" y="380" width="640" height="1" fill="#2d1a3e" opacity="0.5"/>
  <text x="60" y="420" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Kernel-based Virtual Machine · Network Bridge · Cockpit UI</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#431407" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#fb923c" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>