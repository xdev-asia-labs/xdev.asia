<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#30363d"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#e3b341"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#3fb950"/>
    </marker>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="960" height="430" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="38" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" fill="#e6edf3" text-anchor="middle" font-weight="700">UltraPlan Architecture</text>
  <text x="480" y="57" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11.5" fill="#8b949e" text-anchor="middle">/ultraplan — multi-agent planning via Claude opus-4.6 and Cloud Code REPL</text>
  <line x1="40" y1="68" x2="920" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- ===== NODE 1: User / Local CLI ===== -->
  <g transform="translate(40,100)">
    <rect width="140" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="70" y="28" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#e6edf3" text-anchor="middle" font-weight="600">User</text>
    <text x="70" y="44" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#8b949e" text-anchor="middle">Local CLI</text>
    <text x="70" y="62" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#58a6ff" text-anchor="middle">/ultraplan &lt;goal&gt;</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="182" y1="135" x2="235" y2="135" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="208" y="127" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#58a6ff" text-anchor="middle">cmd</text>

  <!-- ===== NODE 2: ultraplan.tsx handler ===== -->
  <g transform="translate(237,100)">
    <rect width="155" height="70" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
    <text x="78" y="24" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#e3b341" text-anchor="middle" font-weight="600">ultraplan.tsx</text>
    <text x="78" y="40" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#8b949e" text-anchor="middle">detects /ultraplan</text>
    <text x="78" y="54" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#8b949e" text-anchor="middle">anti-self-trigger check</text>
    <text x="78" y="68" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#e3b341" text-anchor="middle">timeout: 30 min</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="394" y1="135" x2="447" y2="135" stroke="#e3b341" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <text x="420" y="127" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#e3b341" text-anchor="middle">teleport</text>

  <!-- ===== NODE 3: CCR Cloud ===== -->
  <g transform="translate(449,85)">
    <rect width="160" height="100" rx="8" fill="#1f6feb" fill-opacity="0.1" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="80" y="24" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#79c0ff" text-anchor="middle" font-weight="700">CCR Cloud</text>
    <text x="80" y="40" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#58a6ff" text-anchor="middle">Cloud Code REPL</text>
    <line x1="12" y1="50" x2="148" y2="50" stroke="#1f6feb" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="80" y="64" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#8b949e" text-anchor="middle">opus-4.6 model</text>
    <text x="80" y="78" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#8b949e" text-anchor="middle">WorkSecret auth (JWT)</text>
    <text x="80" y="92" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#8b949e" text-anchor="middle">max 32 sessions</text>
  </g>

  <!-- Arrow 3→agents (fan out) -->
  <line x1="609" y1="135" x2="660" y2="98" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="609" y1="135" x2="660" y2="140" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="609" y1="135" x2="660" y2="182" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="635" y="130" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#3fb950" text-anchor="middle">spawn</text>

  <!-- ===== AGENT NODES ===== -->
  <!-- Agent 1 -->
  <g transform="translate(663,75)">
    <rect width="130" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
    <text x="65" y="19" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">Agent 1</text>
    <text x="65" y="33" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">Research · Analyze</text>
    <text x="65" y="45" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">Read / Search tools</text>
  </g>

  <!-- Agent 2 -->
  <g transform="translate(663,118)">
    <rect width="130" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
    <text x="65" y="19" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">Agent 2</text>
    <text x="65" y="33" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">Implement · Verify</text>
    <text x="65" y="45" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">Edit / Bash tools</text>
  </g>

  <!-- Agent N -->
  <g transform="translate(663,161)">
    <rect width="130" height="50" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" stroke-dasharray="4,2"/>
    <text x="65" y="19" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#3fb950" text-anchor="middle" font-weight="600">Agent N</text>
    <text x="65" y="33" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">Specialize task…</text>
    <text x="65" y="45" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">any tool set</text>
  </g>

  <!-- Arrow agents → coordinator -->
  <line x1="795" y1="100" x2="845" y2="140" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="795" y1="143" x2="845" y2="148" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="795" y1="186" x2="845" y2="163" stroke="#bc8cff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="822" y="130" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#bc8cff" text-anchor="middle">gather</text>

  <!-- ===== NODE: Coordinator ===== -->
  <g transform="translate(847,110)">
    <rect width="100" height="70" rx="8" fill="#161b22" stroke="#bc8cff" stroke-width="1.5"/>
    <text x="50" y="22" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#bc8cff" text-anchor="middle" font-weight="700">Coordinator</text>
    <line x1="8" y1="29" x2="92" y2="29" stroke="#bc8cff" stroke-width="0.5" stroke-opacity="0.5"/>
    <text x="50" y="43" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">COORDINATOR</text>
    <text x="50" y="55" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#8b949e" text-anchor="middle">_MODE=1</text>
    <text x="50" y="67" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#bc8cff" text-anchor="middle">merges results</text>
  </g>

  <!-- Arrow coordinator → plan output (down) -->
  <line x1="897" y1="182" x2="897" y2="230" stroke="#3fb950" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="915" y="210" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9.5" fill="#3fb950">plan</text>

  <!-- ===== OUTPUT BOX ===== -->
  <g transform="translate(820,232)">
    <rect width="155" height="55" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="78" y="20" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#3fb950" text-anchor="middle" font-weight="600">Plan Output</text>
    <text x="78" y="36" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#8b949e" text-anchor="middle">structured task list</text>
    <text x="78" y="49" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#8b949e" text-anchor="middle">returned to user CLI</text>
  </g>

  <!-- ===== BOTTOM: key details panel ===== -->
  <rect x="40" y="290" width="750" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="415" y="312" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#8b949e" text-anchor="middle" font-weight="600">Implementation Details</text>
  <line x1="55" y1="319" x2="775" y2="319" stroke="#30363d" stroke-width="0.5"/>

  <!-- Detail columns -->
  <g font-family="ui-monospace,SFMono-Regular,monospace" font-size="11">
    <text x="65" y="338" fill="#8b949e">Model:</text>
    <text x="115" y="338" fill="#58a6ff">claude-opus-4-6 (20250514)</text>

    <text x="65" y="355" fill="#8b949e">Timeout:</text>
    <text x="122" y="355" fill="#e3b341">ULTRAPLAN_TIMEOUT_MS = 30 min</text>

    <text x="65" y="372" fill="#8b949e">Max sessions:</text>
    <text x="148" y="372" fill="#3fb950">SPAWN_SESSIONS_DEFAULT = 32</text>

    <text x="400" y="338" fill="#8b949e">Auth:</text>
    <text x="437" y="338" fill="#bc8cff">WorkSecret → JWT → buildSdkUrl(ws://|wss://)</text>

    <text x="400" y="355" fill="#8b949e">Guard:</text>
    <text x="440" y="355" fill="#ff7b72">CLAUDE_CODE_IS_ULTRAPLAN env prevents recursion</text>

    <text x="400" y="372" fill="#8b949e">Trigger:</text>
    <text x="448" y="372" fill="#8b949e">/ultraplan &lt;task&gt; → starts async CCR session</text>
  </g>

  <!-- PRNG pipeline label -->
  <text x="480" y="410" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#8b949e" text-anchor="middle">bridge/workSecret.ts · commands/ultraplan.tsx · coordinator/coordinatorMode.ts</text>
</svg>
