<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1a28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="250" cy="180" rx="280" ry="280" fill="#06b6d4" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="900" cy="350" rx="280" ry="280" fill="#8b5cf6" opacity="0.07" filter="url(#blur)"/>
  <ellipse cx="600" cy="550" rx="300" ry="200" fill="#6366f1" opacity="0.05" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- xClaw Agent Architecture -->
  <g transform="translate(680, 60)" filter="url(#shadow)">
    <rect width="450" height="510" rx="16" fill="#111827" stroke="#1e3a5f" stroke-width="1.5" opacity="0.9"/>

    <!-- Multi-LLM header -->
    <rect x="30" y="30" width="390" height="40" rx="8" fill="#06b6d4" opacity="0.15" stroke="#06b6d4" stroke-width="1"/>
    <text x="225" y="55" font-family="system-ui,sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" font-weight="600">🤖 xClaw AI Agent Platform</text>

    <!-- LLM boxes -->
    <rect x="30" y="85" width="85" height="40" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1"/>
    <text x="72" y="110" font-family="monospace" font-size="10" fill="#22d3ee" text-anchor="middle">GPT-4</text>
    <rect x="125" y="85" width="85" height="40" rx="6" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
    <text x="167" y="110" font-family="monospace" font-size="10" fill="#a855f7" text-anchor="middle">Claude</text>
    <rect x="220" y="85" width="85" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="262" y="110" font-family="monospace" font-size="10" fill="#f59e0b" text-anchor="middle">Gemini</text>
    <rect x="315" y="85" width="105" height="40" rx="6" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="367" y="110" font-family="monospace" font-size="10" fill="#22c55e" text-anchor="middle">Local LLM</text>

    <!-- Arrow down -->
    <text x="225" y="145" font-family="system-ui,sans-serif" font-size="14" fill="#475569" text-anchor="middle">▼</text>

    <!-- Workflow Engine -->
    <rect x="30" y="155" width="390" height="40" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="225" y="180" font-family="system-ui,sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle" font-weight="600">Workflow Engine + RAG Pipeline</text>

    <!-- Arrow down -->
    <text x="225" y="215" font-family="system-ui,sans-serif" font-size="14" fill="#475569" text-anchor="middle">▼</text>

    <!-- Domain packs grid -->
    <text x="30" y="240" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8" font-weight="600">13 Domain Packs</text>
    <g transform="translate(30, 250)">
      <rect width="85" height="28" rx="5" fill="#164e63" opacity="0.6"/>
      <text x="42" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Healthcare</text>
      <rect x="95" width="85" height="28" rx="5" fill="#164e63" opacity="0.6"/>
      <text x="137" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Finance</text>
      <rect x="190" width="85" height="28" rx="5" fill="#164e63" opacity="0.6"/>
      <text x="232" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Legal</text>
      <rect x="285" width="85" height="28" rx="5" fill="#164e63" opacity="0.6"/>
      <text x="327" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">Education</text>
    </g>
    <g transform="translate(30, 285)">
      <rect width="85" height="28" rx="5" fill="#164e63" opacity="0.4"/>
      <text x="42" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">DevOps</text>
      <rect x="95" width="85" height="28" rx="5" fill="#164e63" opacity="0.4"/>
      <text x="137" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">E-comm</text>
      <rect x="190" width="85" height="28" rx="5" fill="#164e63" opacity="0.4"/>
      <text x="232" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">HR</text>
      <rect x="285" width="85" height="28" rx="5" fill="#164e63" opacity="0.4"/>
      <text x="327" y="19" font-family="monospace" font-size="9" fill="#22d3ee" text-anchor="middle">+5 more</text>
    </g>

    <!-- 8 Chat Channels -->
    <text x="30" y="350" font-family="system-ui,sans-serif" font-size="11" fill="#94a3b8" font-weight="600">8 Chat Channels</text>
    <rect x="30" y="360" width="390" height="35" rx="6" fill="#1e293b"/>
    <text x="50" y="382" font-family="monospace" font-size="10" fill="#60a5fa">Web · Slack · Teams · Discord · Telegram · API · Widget · SDK</text>

    <!-- Dual Database -->
    <rect x="30" y="410" width="185" height="45" rx="8" fill="#1e293b" stroke="#336791" stroke-width="1"/>
    <text x="122" y="430" font-family="monospace" font-size="10" fill="#60a5fa" text-anchor="middle">PostgreSQL</text>
    <text x="122" y="445" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">Structured Data</text>
    <rect x="225" y="410" width="195" height="45" rx="8" fill="#1e293b" stroke="#22c55e" stroke-width="1"/>
    <text x="322" y="430" font-family="monospace" font-size="10" fill="#22c55e" text-anchor="middle">Vector DB</text>
    <text x="322" y="445" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">Embeddings</text>

    <!-- MCP + RBAC -->
    <text x="30" y="485" font-family="monospace" font-size="10" fill="#f59e0b" opacity="0.7">MCP Protocol · Multi-tenant RBAC · Docker Deploy</text>
  </g>

  <!-- Title -->
  <text x="60" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#22d3ee" font-weight="600" letter-spacing="3">AI AGENT PLATFORM</text>
  <text x="60" y="195" font-family="system-ui,-apple-system,sans-serif" font-size="48" fill="#f1f5f9" font-weight="700">xClaw</text>
  <text x="60" y="250" font-family="system-ui,-apple-system,sans-serif" font-size="30" fill="#94a3b8" font-weight="400">Hướng dẫn</text>
  <text x="60" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="30" fill="#94a3b8" font-weight="400">thực chiến A→Z</text>

  <rect x="60" y="340" width="100" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="110" y="359" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Multi-LLM</text>
  <rect x="170" y="340" width="70" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="205" y="359" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">RAG</text>
  <rect x="250" y="340" width="100" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="300" y="359" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Workflow</text>
  <rect x="360" y="340" width="70" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="395" y="359" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">MCP</text>

  <rect x="60" y="405" width="560" height="1" fill="#1e3a5f" opacity="0.5"/>
  <text x="60" y="440" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">TypeScript Monorepo · 13 Domains · Docker Production</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#164e63" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>