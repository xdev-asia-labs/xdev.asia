<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#071a0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="250" cy="200" rx="280" ry="280" fill="#10b981" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="900" cy="350" rx="250" ry="250" fill="#059669" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#10b981" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Lock/Shield icon panel -->
  <g transform="translate(780, 100)" filter="url(#shadow)">
    <rect width="340" height="420" rx="16" fill="#111827" stroke="#1a3a2a" stroke-width="1.5" opacity="0.9"/>
    <!-- Shield shape -->
    <path d="M170,50 L260,90 L260,190 C260,250 220,290 170,310 C120,290 80,250 80,190 L80,90 Z" fill="none" stroke="#10b981" stroke-width="2.5" opacity="0.7"/>
    <path d="M170,70 L240,100 L240,185 C240,235 210,268 170,285 C130,268 100,235 100,185 L100,100 Z" fill="#064e3b" opacity="0.3"/>
    <!-- Lock icon inside shield -->
    <rect x="150" y="150" width="40" height="30" rx="4" fill="none" stroke="#34d399" stroke-width="2"/>
    <path d="M155,150 L155,138 C155,128 165,120 170,120 C175,120 185,128 185,138 L185,150" fill="none" stroke="#34d399" stroke-width="2"/>
    <circle cx="170" cy="167" r="4" fill="#34d399"/>
    <!-- Binary data stream -->
    <text x="50" y="355" font-family="monospace" font-size="11" fill="#10b981" opacity="0.5">01001000 11010010</text>
    <text x="50" y="372" font-family="monospace" font-size="11" fill="#10b981" opacity="0.4">AES-256 █████████</text>
    <text x="50" y="389" font-family="monospace" font-size="11" fill="#10b981" opacity="0.3">10110101 01101001</text>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#10b981" font-weight="600" letter-spacing="3">ENCRYPTION · SECURITY</text>
  <text x="60" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="46" fill="#f1f5f9" font-weight="700">Mã Hóa Dữ Liệu</text>
  <text x="60" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="38" fill="#94a3b8" font-weight="400">Healthcare</text>

  <!-- Stats -->
  <rect x="60" y="310" width="180" height="70" rx="10" fill="#111827" stroke="#1a3a2a" stroke-width="1"/>
  <text x="70" y="338" font-family="monospace" font-size="12" fill="#6ee7b7">RECORDS</text>
  <text x="70" y="365" font-family="system-ui,sans-serif" font-size="22" fill="#f1f5f9" font-weight="700">100,000+</text>
  <rect x="260" y="310" width="180" height="70" rx="10" fill="#111827" stroke="#1a3a2a" stroke-width="1"/>
  <text x="270" y="338" font-family="monospace" font-size="12" fill="#6ee7b7">APPROACHES</text>
  <text x="270" y="365" font-family="system-ui,sans-serif" font-size="22" fill="#f1f5f9" font-weight="700">3 Methods</text>

  <!-- Tags -->
  <rect x="60" y="420" width="110" height="28" rx="14" fill="#064e3b" opacity="0.6"/>
  <text x="115" y="439" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">Spring Boot</text>
  <rect x="180" y="420" width="110" height="28" rx="14" fill="#064e3b" opacity="0.6"/>
  <text x="235" y="439" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">PostgreSQL</text>
  <rect x="300" y="420" width="90" height="28" rx="14" fill="#064e3b" opacity="0.6"/>
  <text x="345" y="439" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">AES-256</text>

  <rect x="60" y="480" width="640" height="1" fill="#1a3a2a" opacity="0.5"/>
  <text x="60" y="515" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Searchable Encryption · Patient Data Protection · HIPAA Compliance</text>

  <rect x="60" y="555" width="90" height="32" rx="6" fill="#065f46" opacity="0.3"/>
  <text x="105" y="576" font-family="system-ui,sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>