<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#130820"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="280" ry="280" fill="#8b5cf6" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="900" cy="400" rx="250" ry="250" fill="#6366f1" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Hierarchy tree -->
  <g transform="translate(700, 60)" filter="url(#shadow)">
    <rect width="430" height="510" rx="16" fill="#111827" stroke="#2d1a4e" stroke-width="1.5" opacity="0.9"/>

    <!-- Top level - Central -->
    <rect x="155" y="35" width="120" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="215" y="58" font-family="system-ui,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Trung ương</text>
    <text x="215" y="74" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">Full Access</text>

    <!-- Lines down -->
    <line x1="215" y1="85" x2="215" y2="105" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="105" x2="330" y2="105" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="105" x2="100" y2="120" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="215" y1="105" x2="215" y2="120" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>
    <line x1="330" y1="105" x2="330" y2="120" stroke="#8b5cf6" stroke-width="1" opacity="0.5"/>

    <!-- Province level -->
    <rect x="40" y="120" width="120" height="45" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="100" y="142" font-family="system-ui,sans-serif" font-size="10" fill="#818cf8" text-anchor="middle" font-weight="600">Tỉnh A</text>
    <text x="100" y="156" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Province</text>

    <rect x="155" y="120" width="120" height="45" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="215" y="142" font-family="system-ui,sans-serif" font-size="10" fill="#818cf8" text-anchor="middle" font-weight="600">Tỉnh B</text>
    <text x="215" y="156" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Province</text>

    <rect x="270" y="120" width="120" height="45" rx="8" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
    <text x="330" y="142" font-family="system-ui,sans-serif" font-size="10" fill="#818cf8" text-anchor="middle" font-weight="600">Tỉnh C</text>
    <text x="330" y="156" font-family="monospace" font-size="8" fill="#6b7280" text-anchor="middle">Province</text>

    <!-- District level -->
    <line x1="100" y1="165" x2="100" y2="195" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <line x1="60" y1="195" x2="140" y2="195" stroke="#6366f1" stroke-width="1" opacity="0.4"/>
    <rect x="30" y="200" width="65" height="35" rx="6" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="62" y="222" font-family="system-ui,sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Huyện 1</text>
    <rect x="105" y="200" width="65" height="35" rx="6" fill="#1e293b" stroke="#4f46e5" stroke-width="1"/>
    <text x="137" y="222" font-family="system-ui,sans-serif" font-size="9" fill="#a5b4fc" text-anchor="middle">Huyện 2</text>

    <!-- Ward level -->
    <line x1="62" y1="235" x2="62" y2="255" stroke="#4f46e5" stroke-width="1" opacity="0.3"/>
    <rect x="30" y="255" width="65" height="30" rx="5" fill="#1e293b" stroke="#3730a3" stroke-width="1"/>
    <text x="62" y="275" font-family="system-ui,sans-serif" font-size="8" fill="#c7d2fe" text-anchor="middle">Xã/Phường</text>

    <!-- Data isolation diagram -->
    <rect x="30" y="310" width="370" height="2" fill="#2d1a4e" opacity="0.5"/>
    <text x="215" y="340" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="600">Row-Level Security (RLS)</text>

    <!-- Policy rules -->
    <rect x="30" y="355" width="370" height="32" rx="5" fill="#1e293b"/>
    <text x="45" y="376" font-family="monospace" font-size="10" fill="#a78bfa">CREATE POLICY province_isolation</text>
    <rect x="30" y="393" width="370" height="32" rx="5" fill="#1e293b"/>
    <text x="45" y="414" font-family="monospace" font-size="10" fill="#a78bfa">USING (province_id = current_user_province())</text>

    <!-- Permission matrix -->
    <text x="30" y="455" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.7">✓ Data isolation per admin level</text>
    <text x="30" y="475" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.5">✓ Hierarchical inheritance</text>
    <text x="30" y="495" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.5">✓ Audit logging enabled</text>
  </g>

  <!-- Title -->
  <text x="60" y="130" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#a78bfa" font-weight="600" letter-spacing="3">ARCHITECTURE</text>
  <text x="60" y="192" font-family="system-ui,-apple-system,sans-serif" font-size="40" fill="#f1f5f9" font-weight="700">Phân quyền</text>
  <text x="60" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="40" fill="#f1f5f9" font-weight="700">Dữ liệu</text>
  <text x="60" y="290" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#94a3b8" font-weight="400">Cấp Hành chính</text>

  <rect x="60" y="340" width="70" height="28" rx="14" fill="#2e1065" opacity="0.6"/>
  <text x="95" y="359" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">RLS</text>
  <rect x="140" y="340" width="80" height="28" rx="14" fill="#2e1065" opacity="0.6"/>
  <text x="180" y="359" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">RBAC</text>
  <rect x="230" y="340" width="125" height="28" rx="14" fill="#2e1065" opacity="0.6"/>
  <text x="292" y="359" font-family="system-ui,sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">Multi-tenant</text>

  <rect x="60" y="405" width="580" height="1" fill="#2d1a4e" opacity="0.5"/>
  <text x="60" y="440" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Chính phủ · Tập đoàn · Chuỗi bán lẻ · Healthcare</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#2e1065" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>