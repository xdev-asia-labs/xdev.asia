<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#336791"/>
      <stop offset="100%" style="stop-color:#2a5478"/>
    </linearGradient>
    <linearGradient id="upgrade-arrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#336791"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="280" ry="280" fill="#336791" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="900" cy="400" rx="250" ry="250" fill="#22c55e" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#336791" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Upgrade visualization -->
  <g transform="translate(720, 80)" filter="url(#shadow)">
    <rect width="400" height="470" rx="16" fill="#111827" stroke="#1e3a5f" stroke-width="1.5" opacity="0.9"/>

    <!-- Old version -->
    <rect x="40" y="40" width="140" height="120" rx="10" fill="#1e293b" stroke="#336791" stroke-width="2"/>
    <text x="110" y="75" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">PostgreSQL</text>
    <text x="110" y="110" font-family="system-ui,sans-serif" font-size="32" fill="#336791" text-anchor="middle" font-weight="700">17.6</text>
    <text x="110" y="140" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Current</text>

    <!-- Upgrade arrow -->
    <line x1="185" y1="100" x2="215" y2="100" stroke="url(#upgrade-arrow)" stroke-width="3"/>
    <polygon points="212,92 228,100 212,108" fill="#22c55e"/>

    <!-- New version -->
    <rect x="220" y="40" width="140" height="120" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="290" y="75" font-family="system-ui,sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">PostgreSQL</text>
    <text x="290" y="110" font-family="system-ui,sans-serif" font-size="32" fill="#22c55e" text-anchor="middle" font-weight="700">18.1</text>
    <text x="290" y="140" font-family="monospace" font-size="10" fill="#22c55e" text-anchor="middle">Target</text>

    <!-- Upgrade steps -->
    <text x="40" y="200" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="600">Upgrade Steps</text>
    <rect x="40" y="214" width="320" height="32" rx="6" fill="#1e293b"/>
    <circle cx="60" cy="230" r="8" fill="#22c55e" opacity="0.8"/>
    <text x="60" y="234" font-family="system-ui,sans-serif" font-size="9" fill="#0d1117" text-anchor="middle" font-weight="700">1</text>
    <text x="78" y="234" font-family="monospace" font-size="11" fill="#a1a1aa">pg_upgrade --check</text>

    <rect x="40" y="254" width="320" height="32" rx="6" fill="#1e293b"/>
    <circle cx="60" cy="270" r="8" fill="#22c55e" opacity="0.8"/>
    <text x="60" y="274" font-family="system-ui,sans-serif" font-size="9" fill="#0d1117" text-anchor="middle" font-weight="700">2</text>
    <text x="78" y="274" font-family="monospace" font-size="11" fill="#a1a1aa">pg_upgrade --swap (new!)</text>

    <rect x="40" y="294" width="320" height="32" rx="6" fill="#1e293b"/>
    <circle cx="60" cy="310" r="8" fill="#22c55e" opacity="0.8"/>
    <text x="60" y="314" font-family="system-ui,sans-serif" font-size="9" fill="#0d1117" text-anchor="middle" font-weight="700">3</text>
    <text x="78" y="314" font-family="monospace" font-size="11" fill="#a1a1aa">ANALYZE + verify</text>

    <!-- New features in 18 -->
    <text x="40" y="365" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="600">PG 18 Highlights</text>
    <text x="40" y="390" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.7">✦ Async I/O Engine</text>
    <text x="40" y="410" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.7">✦ Statistics Preservation</text>
    <text x="40" y="430" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.7">✦ pg_upgrade --swap mode</text>
    <text x="40" y="450" font-family="monospace" font-size="11" fill="#f59e0b" opacity="0.7">↻ Rollback Plan Ready</text>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#60a5fa" font-weight="600" letter-spacing="3">PRODUCTION UPGRADE</text>
  <text x="60" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="42" fill="#f1f5f9" font-weight="700">PostgreSQL</text>
  <text x="60" y="255" font-family="system-ui,-apple-system,sans-serif" font-size="38" fill="#94a3b8" font-weight="400">17.6 → 18.1</text>

  <rect x="60" y="310" width="110" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="115" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">pg_upgrade</text>
  <rect x="180" y="310" width="130" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="245" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">Logical Rep</text>
  <rect x="320" y="310" width="100" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="370" y="329" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">Rollback</text>

  <rect x="60" y="380" width="600" height="1" fill="#1e3a5f" opacity="0.5"/>
  <text x="60" y="420" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Minimal Downtime · Async I/O · Statistics Preservation</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#1e3a5f" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>