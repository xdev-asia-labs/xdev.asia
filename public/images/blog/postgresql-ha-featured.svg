<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#336791"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="280" ry="280" fill="#336791" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="600" cy="500" rx="300" ry="200" fill="#f59e0b" opacity="0.05" filter="url(#blur)"/>
  <ellipse cx="1000" cy="300" rx="250" ry="250" fill="#22c55e" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#336791" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- HA Cluster diagram -->
  <g transform="translate(700, 60)" filter="url(#shadow)">
    <rect width="430" height="510" rx="16" fill="#111827" stroke="#1e3a5f" stroke-width="1.5" opacity="0.9"/>

    <!-- Primary node -->
    <rect x="140" y="40" width="150" height="90" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <text x="215" y="70" font-family="system-ui,sans-serif" font-size="12" fill="#22c55e" text-anchor="middle" font-weight="600">PRIMARY</text>
    <text x="215" y="90" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">PostgreSQL</text>
    <text x="215" y="110" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Read/Write</text>
    <circle cx="280" cy="55" r="6" fill="#22c55e" filter="url(#glow)"/>

    <!-- Replication arrows -->
    <line x1="170" y1="130" x2="100" y2="175" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="260" y1="130" x2="330" y2="175" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="215" y="165" font-family="monospace" font-size="9" fill="#f59e0b" text-anchor="middle">Streaming Replication</text>

    <!-- Replica 1 -->
    <rect x="30" y="180" width="140" height="80" rx="10" fill="#1e293b" stroke="#336791" stroke-width="1.5"/>
    <text x="100" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">REPLICA 1</text>
    <text x="100" y="228" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Read-Only</text>
    <text x="100" y="248" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle">● Sync</text>

    <!-- Replica 2 -->
    <rect x="260" y="180" width="140" height="80" rx="10" fill="#1e293b" stroke="#336791" stroke-width="1.5"/>
    <text x="330" y="208" font-family="system-ui,sans-serif" font-size="11" fill="#60a5fa" text-anchor="middle" font-weight="600">REPLICA 2</text>
    <text x="330" y="228" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Read-Only</text>
    <text x="330" y="248" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle">● Async</text>

    <!-- Patroni/HAProxy -->
    <rect x="30" y="300" width="370" height="40" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="215" y="325" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">Patroni + etcd (Auto Failover)</text>

    <rect x="30" y="355" width="370" height="40" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
    <text x="215" y="380" font-family="system-ui,sans-serif" font-size="12" fill="#a855f7" text-anchor="middle" font-weight="600">HAProxy (Load Balancer)</text>

    <!-- Ansible automation -->
    <rect x="30" y="415" width="370" height="60" rx="8" fill="#0f1b0f" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="50" y="438" font-family="monospace" font-size="11" fill="#22c55e">$ ansible-playbook deploy-ha.yml</text>
    <text x="50" y="458" font-family="monospace" font-size="10" fill="#22c55e" opacity="0.6">✓ Cluster deployed in 5 minutes</text>
  </g>

  <!-- Title -->
  <text x="60" y="120" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#f59e0b" font-weight="600" letter-spacing="3">HIGH AVAILABILITY</text>
  <text x="60" y="185" font-family="system-ui,-apple-system,sans-serif" font-size="44" fill="#f1f5f9" font-weight="700">PostgreSQL HA</text>
  <text x="60" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Cluster</text>
  <text x="60" y="285" font-family="system-ui,-apple-system,sans-serif" font-size="28" fill="#f59e0b" font-weight="400">với Ansible</text>

  <rect x="60" y="330" width="100" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="110" y="349" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">Patroni</text>
  <rect x="170" y="330" width="80" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="210" y="349" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">etcd</text>
  <rect x="260" y="330" width="100" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="310" y="349" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">HAProxy</text>
  <rect x="370" y="330" width="90" height="28" rx="14" fill="#1e3a5f" opacity="0.6"/>
  <text x="415" y="349" font-family="system-ui,sans-serif" font-size="12" fill="#60a5fa" text-anchor="middle">Ansible</text>

  <rect x="60" y="400" width="580" height="1" fill="#1e3a5f" opacity="0.5"/>
  <text x="60" y="435" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Auto Failover · Streaming Replication · Load Balancing</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#1e3a5f" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#60a5fa" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>