<svg xmlns="http://www.w3.org/2000/svg" width="960" height="380" viewBox="0 0 960 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>

  <rect width="960" height="380" fill="url(#bg)"/>

  <!-- Header -->
  <text x="480" y="38" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" fill="#e6edf3" text-anchor="middle" font-weight="700">Buddy Rarity System</text>
  <text x="480" y="57" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11.5" fill="#8b949e" text-anchor="middle">stat = floor + rng(0, 100-floor)  ·  higher rarity = higher floor = higher minimum stats</text>
  <line x1="40" y1="68" x2="920" y2="68" stroke="#30363d" stroke-width="1"/>

  <!-- Labels column -->
  <!-- COMMON row at y=90 -->
  <text x="45" y="103" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#6e7681" font-weight="600">COMMON</text>
  <text x="45" y="118" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#6e7681">weight: 100 · floor: 5</text>

  <!-- COMMON bar -->
  <rect x="195" y="90" width="680" height="36" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- floor segment -->
  <rect x="195" y="90" width="34" height="36" rx="4" fill="#6e7681"/>
  <rect x="225" y="90" width="4" height="36" fill="#6e7681"/>
  <!-- range segment -->
  <rect x="229" y="90" width="646" height="36" rx="0" fill="#6e7681" fill-opacity="0.18"/>
  <rect x="870" y="90" width="5" height="36" rx="0" fill="#6e7681" fill-opacity="0.18"/>
  <text x="203" y="113" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#0d1117" font-weight="700">5</text>
  <text x="235" y="108" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#6e7681">range: 5 – 100</text>
  <text x="235" y="121" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#6e7681" opacity="0.7">per stat (speed, wisdom, charisma)</text>
  <text x="885" y="113" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#6e7681">100</text>

  <!-- UNCOMMON row at y=145 -->
  <text x="45" y="158" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#3fb950" font-weight="600">UNCOMMON</text>
  <text x="45" y="173" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#3fb950">weight: 40 · floor: 15</text>

  <rect x="195" y="145" width="680" height="36" rx="4" fill="#161b22" stroke="#3fb950" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="195" y="145" width="102" height="36" rx="4" fill="#3fb950"/>
  <rect x="289" y="145" width="4" height="36" fill="#3fb950"/>
  <rect x="293" y="145" width="582" height="36" fill="#3fb950" fill-opacity="0.15"/>
  <rect x="870" y="145" width="5" height="36" fill="#3fb950" fill-opacity="0.15"/>
  <text x="203" y="168" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#0d1117" font-weight="700">15</text>
  <text x="297" y="163" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#3fb950">range: 15 – 100</text>
  <text x="297" y="176" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#3fb950" opacity="0.7">odds: 1 in ~3.8 rolls</text>
  <text x="885" y="168" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#3fb950">100</text>

  <!-- RARE row at y=200 -->
  <text x="45" y="213" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#58a6ff" font-weight="600">RARE</text>
  <text x="45" y="228" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#58a6ff">weight: 15 · floor: 25</text>

  <rect x="195" y="200" width="680" height="36" rx="4" fill="#161b22" stroke="#58a6ff" stroke-width="1.2" stroke-opacity="0.6"/>
  <rect x="195" y="200" width="170" height="36" rx="4" fill="#58a6ff"/>
  <rect x="357" y="200" width="4" height="36" fill="#58a6ff"/>
  <rect x="361" y="200" width="514" height="36" fill="#58a6ff" fill-opacity="0.15"/>
  <rect x="870" y="200" width="5" height="36" fill="#58a6ff" fill-opacity="0.15"/>
  <text x="203" y="223" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#0d1117" font-weight="700">25</text>
  <text x="365" y="218" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#58a6ff">range: 25 – 100</text>
  <text x="365" y="231" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#58a6ff" opacity="0.7">odds: 1 in ~10 rolls</text>
  <text x="885" y="223" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#58a6ff">100</text>

  <!-- EPIC row at y=255 -->
  <text x="45" y="268" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#bc8cff" font-weight="600">EPIC</text>
  <text x="45" y="283" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#bc8cff">weight: 5 · floor: 35</text>

  <rect x="195" y="255" width="680" height="36" rx="4" fill="#161b22" stroke="#bc8cff" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="195" y="255" width="238" height="36" rx="4" fill="#bc8cff"/>
  <rect x="425" y="255" width="4" height="36" fill="#bc8cff"/>
  <rect x="429" y="255" width="446" height="36" fill="#bc8cff" fill-opacity="0.18"/>
  <rect x="870" y="255" width="5" height="36" fill="#bc8cff" fill-opacity="0.18"/>
  <text x="203" y="278" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#0d1117" font-weight="700">35</text>
  <text x="433" y="273" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#bc8cff">range: 35 – 100</text>
  <text x="433" y="286" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#bc8cff" opacity="0.7">odds: 1 in ~30 rolls</text>
  <text x="885" y="278" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#bc8cff">100</text>

  <!-- LEGENDARY row at y=310 -->
  <text x="45" y="323" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#f0883e" font-weight="700">LEGENDARY</text>
  <text x="45" y="338" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#f0883e">weight: 2 · floor: 50</text>

  <rect x="195" y="310" width="680" height="36" rx="4" fill="#161b22" stroke="#f0883e" stroke-width="2" stroke-opacity="0.8"/>
  <rect x="195" y="310" width="340" height="36" rx="4" fill="#f0883e"/>
  <rect x="527" y="310" width="4" height="36" fill="#f0883e"/>
  <rect x="531" y="310" width="344" height="36" fill="#f0883e" fill-opacity="0.2"/>
  <rect x="870" y="310" width="5" height="36" fill="#f0883e" fill-opacity="0.2"/>
  <text x="203" y="333" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#0d1117" font-weight="700">50</text>
  <text x="535" y="328" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10.5" fill="#f0883e">range: 50 – 100</text>
  <text x="535" y="341" font-family="ui-monospace,SFMono-Regular,monospace" font-size="10" fill="#f0883e" opacity="0.7">odds: 1 in ~157 rolls</text>
  <text x="885" y="333" font-family="ui-monospace,SFMono-Regular,monospace" font-size="11" fill="#f0883e">100</text>

  <!-- Scale labels at bottom -->
  <line x1="195" y1="360" x2="875" y2="360" stroke="#30363d" stroke-width="1"/>
  <text x="195" y="373" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#8b949e" text-anchor="middle">0</text>
  <text x="365" y="373" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#8b949e" text-anchor="middle">25</text>
  <text x="535" y="373" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#8b949e" text-anchor="middle">50</text>
  <text x="705" y="373" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#8b949e" text-anchor="middle">75</text>
  <text x="875" y="373" font-family="ui-monospace,SFMono-Regular,monospace" font-size="9" fill="#8b949e" text-anchor="middle">100</text>

  <!-- tick marks -->
  <g stroke="#30363d" stroke-width="1">
    <line x1="365" y1="357" x2="365" y2="363"/>
    <line x1="535" y1="357" x2="535" y2="363"/>
    <line x1="705" y1="357" x2="705" y2="363"/>
  </g>
</svg>
