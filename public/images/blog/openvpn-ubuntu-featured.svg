<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#071a0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="tunnel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e" stop-opacity="0.8"/>
      <stop offset="50%" style="stop-color:#059669" stop-opacity="0.4"/>
      <stop offset="100%" style="stop-color:#22c55e" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="250" ry="250" fill="#22c55e" opacity="0.07" filter="url(#blur)"/>
  <ellipse cx="900" cy="400" rx="280" ry="280" fill="#059669" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- VPN Tunnel visualization -->
  <g transform="translate(700, 70)" filter="url(#shadow)">
    <rect width="430" height="490" rx="16" fill="#111827" stroke="#1a3a2a" stroke-width="1.5" opacity="0.9"/>

    <!-- Client -->
    <rect x="30" y="40" width="120" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="90" y="70" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Client</text>
    <text x="90" y="90" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">10.8.0.2</text>
    <text x="90" y="108" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">Remote</text>

    <!-- Server -->
    <rect x="280" y="40" width="120" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
    <text x="340" y="70" font-family="system-ui,sans-serif" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">VPN Server</text>
    <text x="340" y="90" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">10.8.0.1</text>
    <text x="340" y="108" font-family="monospace" font-size="9" fill="#6b7280" text-anchor="middle">Ubuntu 24.04</text>

    <!-- Encrypted tunnel -->
    <rect x="155" y="55" width="120" height="50" rx="25" fill="none" stroke="url(#tunnel)" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="215" y="85" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle" opacity="0.7">TLS/SSL</text>

    <!-- Internal network -->
    <rect x="30" y="160" width="370" height="40" rx="8" fill="#0f1b0f" stroke="#065f46" stroke-width="1"/>
    <text x="215" y="185" font-family="system-ui,sans-serif" font-size="12" fill="#22c55e" text-anchor="middle">Internal Network: 192.168.1.0/24</text>

    <!-- Config steps -->
    <text x="30" y="235" font-family="system-ui,sans-serif" font-size="12" fill="#94a3b8" font-weight="600">Setup Steps</text>

    <rect x="30" y="250" width="370" height="30" rx="5" fill="#1e293b"/>
    <text x="45" y="270" font-family="monospace" font-size="11" fill="#22c55e">1. apt install openvpn easy-rsa</text>

    <rect x="30" y="288" width="370" height="30" rx="5" fill="#1e293b"/>
    <text x="45" y="308" font-family="monospace" font-size="11" fill="#22c55e">2. ./easyrsa build-ca</text>

    <rect x="30" y="326" width="370" height="30" rx="5" fill="#1e293b"/>
    <text x="45" y="346" font-family="monospace" font-size="11" fill="#22c55e">3. ./easyrsa gen-req server</text>

    <rect x="30" y="364" width="370" height="30" rx="5" fill="#1e293b"/>
    <text x="45" y="384" font-family="monospace" font-size="11" fill="#22c55e">4. systemctl start openvpn</text>

    <!-- Status -->
    <text x="30" y="425" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.7">✓ Status: Active (running)</text>
    <text x="30" y="445" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.5">✓ Clients connected: 12</text>
    <text x="30" y="465" font-family="monospace" font-size="11" fill="#22c55e" opacity="0.5">✓ Uptime: 47 days</text>

    <!-- Lock icon -->
    <rect x="350" y="420" width="50" height="40" rx="6" fill="#065f46" opacity="0.4"/>
    <rect x="365" y="432" width="20" height="16" rx="3" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M369,432 L369,425 C369,420 373,417 375,417 C377,417 381,420 381,425 L381,432" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#22c55e" font-weight="600" letter-spacing="3">VPN · SECURITY</text>
  <text x="60" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="48" fill="#f1f5f9" font-weight="700">OpenVPN</text>
  <text x="60" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Ubuntu 24.04</text>

  <rect x="60" y="320" width="100" height="28" rx="14" fill="#064e3b" opacity="0.6"/>
  <text x="110" y="339" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">OpenVPN</text>
  <rect x="170" y="320" width="100" height="28" rx="14" fill="#064e3b" opacity="0.6"/>
  <text x="220" y="339" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">Easy-RSA</text>
  <rect x="280" y="320" width="85" height="28" rx="14" fill="#064e3b" opacity="0.6"/>
  <text x="322" y="339" font-family="system-ui,sans-serif" font-size="12" fill="#34d399" text-anchor="middle">TLS</text>

  <rect x="60" y="390" width="580" height="1" fill="#1a3a2a" opacity="0.5"/>
  <text x="60" y="425" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Mã nguồn mở · Bảo mật cao · Truy cập từ xa</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#065f46" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#34d399" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>