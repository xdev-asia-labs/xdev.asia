<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1c0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="green-bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="200" cy="200" rx="250" ry="250" fill="#ef4444" opacity="0.07" filter="url(#blur)"/>
  <ellipse cx="900" cy="400" rx="280" ry="280" fill="#f97316" opacity="0.06" filter="url(#blur)"/>

  <g opacity="0.04" stroke="#ef4444" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Circuit breaker state diagram -->
  <g transform="translate(720, 80)" filter="url(#shadow)">
    <rect width="400" height="470" rx="16" fill="#111827" stroke="#3b1515" stroke-width="1.5" opacity="0.9"/>

    <!-- CLOSED state -->
    <circle cx="200" cy="80" r="45" fill="none" stroke="#22c55e" stroke-width="2.5"/>
    <text x="200" y="75" font-family="system-ui,sans-serif" font-size="13" fill="#22c55e" text-anchor="middle" font-weight="600">CLOSED</text>
    <text x="200" y="92" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Normal</text>

    <!-- Arrow down -->
    <line x1="200" y1="125" x2="200" y2="170" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
    <polygon points="195,165 200,175 205,165" fill="#f97316" opacity="0.6"/>
    <text x="270" y="152" font-family="monospace" font-size="9" fill="#f97316" opacity="0.7">failures >= threshold</text>

    <!-- OPEN state -->
    <circle cx="200" cy="220" r="45" fill="none" stroke="#ef4444" stroke-width="2.5" filter="url(#glow)"/>
    <text x="200" y="215" font-family="system-ui,sans-serif" font-size="13" fill="#ef4444" text-anchor="middle" font-weight="600">OPEN</text>
    <text x="200" y="232" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Fail Fast</text>

    <!-- Arrow down -->
    <line x1="200" y1="265" x2="200" y2="310" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
    <polygon points="195,305 200,315 205,305" fill="#f97316" opacity="0.6"/>
    <text x="270" y="293" font-family="monospace" font-size="9" fill="#f97316" opacity="0.7">timeout elapsed</text>

    <!-- HALF-OPEN state -->
    <circle cx="200" cy="360" r="45" fill="none" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="200" y="350" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">HALF</text>
    <text x="200" y="367" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">OPEN</text>
    <text x="200" y="384" font-family="monospace" font-size="10" fill="#6b7280" text-anchor="middle">Testing</text>

    <!-- Arrow back to CLOSED -->
    <path d="M155,360 L60,360 L60,80 L155,80" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.5"/>
    <polygon points="150,75 160,80 150,85" fill="#22c55e" opacity="0.5"/>
    <text x="40" y="220" font-family="monospace" font-size="9" fill="#22c55e" text-anchor="middle" transform="rotate(-90, 40, 220)" opacity="0.7">success</text>

    <!-- Arrow back to OPEN -->
    <path d="M245,360 L340,360 L340,220 L245,220" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <polygon points="250,215 240,220 250,225" fill="#ef4444" opacity="0.5"/>
    <text x="360" y="290" font-family="monospace" font-size="9" fill="#ef4444" text-anchor="middle" transform="rotate(-90, 360, 290)" opacity="0.7">failure</text>

    <!-- Metrics -->
    <text x="120" y="440" font-family="monospace" font-size="10" fill="#6b7280">Resilience4j</text>
    <text x="220" y="440" font-family="monospace" font-size="10" fill="#22c55e">● 99.9% uptime</text>
  </g>

  <!-- Title -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#ef4444" font-weight="600" letter-spacing="3">MICROSERVICES</text>
  <text x="60" y="205" font-family="system-ui,-apple-system,sans-serif" font-size="42" fill="#f1f5f9" font-weight="700">Circuit Breaker</text>
  <text x="60" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Spring Boot</text>

  <rect x="60" y="320" width="120" height="28" rx="14" fill="#450a0a" opacity="0.6"/>
  <text x="120" y="339" font-family="system-ui,sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">Resilience4j</text>
  <rect x="190" y="320" width="115" height="28" rx="14" fill="#450a0a" opacity="0.6"/>
  <text x="247" y="339" font-family="system-ui,sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">Spring Boot</text>
  <rect x="315" y="320" width="100" height="28" rx="14" fill="#450a0a" opacity="0.6"/>
  <text x="365" y="339" font-family="system-ui,sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">Fallback</text>

  <rect x="60" y="390" width="600" height="1" fill="#3b1515" opacity="0.5"/>
  <text x="60" y="430" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Cascading Failure Prevention · Auto Recovery · Monitoring</text>

  <rect x="60" y="550" width="90" height="32" rx="6" fill="#450a0a" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#fca5a5" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>