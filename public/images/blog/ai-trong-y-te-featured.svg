<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0e7490"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="50"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="25"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <ellipse cx="200" cy="180" rx="250" ry="250" fill="#06b6d4" opacity="0.1" filter="url(#blur)"/>
  <ellipse cx="900" cy="400" rx="280" ry="280" fill="#8b5cf6" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="600" cy="600" rx="300" ry="200" fill="#0891b2" opacity="0.06" filter="url(#blur)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <rect x="0" y="0" width="5" height="630" fill="url(#accent)"/>

  <!-- Brain/AI icon -->
  <g transform="translate(780, 120)" filter="url(#shadow)">
    <rect width="340" height="380" rx="16" fill="#111827" stroke="#1e3a5f" stroke-width="1.5" opacity="0.9"/>
    <!-- Neural network nodes -->
    <circle cx="170" cy="100" r="20" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.8"/>
    <circle cx="100" cy="180" r="16" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <circle cx="240" cy="180" r="16" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.6"/>
    <circle cx="70" cy="270" r="14" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.5"/>
    <circle cx="140" cy="270" r="14" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.5"/>
    <circle cx="200" cy="270" r="14" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.5"/>
    <circle cx="270" cy="270" r="14" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.5"/>
    <!-- Connections -->
    <line x1="170" y1="120" x2="100" y2="164" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <line x1="170" y1="120" x2="240" y2="164" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
    <line x1="100" y1="196" x2="70" y2="256" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <line x1="100" y1="196" x2="140" y2="256" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <line x1="240" y1="196" x2="200" y2="256" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <line x1="240" y1="196" x2="270" y2="256" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <!-- Active nodes -->
    <circle cx="170" cy="100" r="6" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="100" cy="180" r="5" fill="#22d3ee" filter="url(#glow)"/>
    <circle cx="240" cy="180" r="5" fill="#22d3ee" filter="url(#glow)"/>
    <!-- Heart/medical cross -->
    <rect x="155" y="320" width="30" height="10" rx="2" fill="#ef4444" opacity="0.8"/>
    <rect x="165" y="310" width="10" height="30" rx="2" fill="#ef4444" opacity="0.8"/>
    <!-- Heartbeat line -->
    <polyline points="60,340 110,340 130,320 145,360 160,340 280,340" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Left text -->
  <text x="60" y="140" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#06b6d4" font-weight="600" letter-spacing="3">AI + HEALTHCARE</text>
  <text x="60" y="200" font-family="system-ui,-apple-system,sans-serif" font-size="48" fill="#f1f5f9" font-weight="700">AI trong Y tế</text>
  <text x="60" y="260" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Cuộc Cách mạng</text>
  <text x="60" y="305" font-family="system-ui,-apple-system,sans-serif" font-size="36" fill="#94a3b8" font-weight="400">Toàn diện</text>

  <!-- Tags -->
  <rect x="60" y="360" width="60" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="90" y="379" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">CNN</text>
  <rect x="130" y="360" width="58" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="159" y="379" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">NLP</text>
  <rect x="198" y="360" width="105" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="250" y="379" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Genomics</text>
  <rect x="313" y="360" width="135" height="28" rx="14" fill="#164e63" opacity="0.6"/>
  <text x="380" y="379" font-family="system-ui,sans-serif" font-size="12" fill="#22d3ee" text-anchor="middle">Drug Discovery</text>

  <!-- Bottom bar -->
  <rect x="60" y="440" width="640" height="1" fill="#1e3a5f" opacity="0.5"/>
  <text x="60" y="480" font-family="system-ui,sans-serif" font-size="14" fill="#64748b">Chẩn đoán hình ảnh · Phân tích EHR · Cá nhân hóa điều trị</text>

  <!-- xDev badge -->
  <rect x="60" y="550" width="90" height="32" rx="6" fill="#0e7490" opacity="0.3"/>
  <text x="105" y="571" font-family="system-ui,sans-serif" font-size="14" fill="#22d3ee" text-anchor="middle" font-weight="600">xDev.asia</text>
</svg>