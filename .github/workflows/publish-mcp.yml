name: Build & Publish MCP Server

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - "content/**"
      - "data/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: mcp-server

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Auto version from git
        run: |
          # Count commits that touch mcp-server/ or content/ or data/
          COMMIT_COUNT=$(git rev-list --count HEAD -- . ../content ../data)
          COMMIT_SHA=$(git rev-parse --short HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          npm version "${VERSION}" --no-git-tag-version --allow-same-version
          echo "📦 Version: ${VERSION} (commit: ${COMMIT_SHA})"

      - name: Bundle content from repo
        run: node scripts/bundle-content.mjs

      - name: Build TypeScript
        run: npm run build

      - name: Verify package contents
        run: |
          echo "📋 Package contents:"
          npm pack --dry-run 2>&1 | tail -10

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
